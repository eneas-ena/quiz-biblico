<title>Quiz Bíblico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&family=Cormorant+Garamond:wght@500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy-1:#0b1437; --navy-2:#111c4e; --navy-3:#0a1030;
  --gold:#e6c158; --gold-deep:#caa033; --gold-soft:#f3deA0;
  --green:#2fa45c; --green-deep:#23823f;
  --blue:#2d7ff9; --blue-deep:#1f5fd6;
  --purple:#8b5cf6; --purple-deep:#6d3fe0;
  --orange:#e0801a; --orange-deep:#c1690f;
  --card:#fbfaf6; --ink:#1c2240; --muted:#7a809a;
  --line:#e7e4d8;
  --good:#2fa45c; --bad:#e0524d;
  --shadow:0 14px 34px rgba(4,8,30,.45);
  --serif:'Cinzel',serif; --read:'Cormorant Garamond',serif; --sans:'Barlow',sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--sans);
  background:#05081a;
  color:#fff; overflow:hidden;
  display:flex; justify-content:center; align-items:stretch;
}
#app{
  width:100%; max-width:440px; height:100dvh;
  position:relative; display:flex; flex-direction:column; overflow:hidden;
  background:
    radial-gradient(900px 700px at 50% -10%, #1a2a66 0%, transparent 60%),
    radial-gradient(700px 600px at 80% 110%, #12224f 0%, transparent 55%),
    linear-gradient(180deg,var(--navy-1),var(--navy-3));
  box-shadow:0 0 70px rgba(0,0,0,.5);
}
@media(min-width:480px){#app{border-left:1px solid rgba(255,255,255,.05);border-right:1px solid rgba(255,255,255,.05)}}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .28s ease,transform .28s ease;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{opacity:1;pointer-events:auto;transform:none}
.pad{padding:22px 20px 26px}
.center{align-items:center;text-align:center}

/* ---------- LOGO / TITLES ---------- */
.crest{width:84px;height:84px;margin:6px auto 2px;display:block}
.title-quiz{font-family:var(--serif);font-weight:900;letter-spacing:.06em;line-height:.92;font-size:46px;color:#fff;text-shadow:0 3px 18px rgba(0,0,0,.45)}
.title-bib{font-family:var(--serif);font-weight:700;letter-spacing:.16em;font-size:30px;color:var(--gold);text-shadow:0 3px 14px rgba(0,0,0,.4)}
.eyebrow{font-family:var(--serif);font-weight:600;letter-spacing:.22em;font-size:12px;color:var(--gold-soft);opacity:.92;margin:14px 0 16px;position:relative;display:inline-block;padding:0 18px}
.eyebrow::before,.eyebrow::after{content:"";position:absolute;top:50%;width:22px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));opacity:.7}
.eyebrow::before{right:100%}.eyebrow::after{left:100%;transform:scaleX(-1)}

/* ---------- LEVEL CARDS ---------- */
.levels{display:grid;grid-template-columns:1fr;gap:14px;width:100%}
.lvl{display:flex;width:100%;align-items:center;gap:14px;background:var(--card);border-radius:18px;padding:15px 16px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:transform .14s ease,box-shadow .14s ease;position:relative}
.lvl:active{transform:scale(.985)}
.lvl.locked{opacity:.62;cursor:not-allowed}
.lvl .ic{width:50px;height:50px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;color:#fff;box-shadow:0 6px 14px rgba(0,0,0,.22)}
.lvl .tx{flex:1;min-width:0;text-align:left}
.lvl .tx h3{font-family:var(--serif);font-weight:700;font-size:17px;letter-spacing:.04em;margin:0 0 3px;color:var(--ink)}
.lvl .tx p{margin:0;font-size:12.5px;color:var(--muted);line-height:1.25}
.lvl .chev{color:var(--muted);font-size:22px;flex:0 0 auto}
.lvl .lock{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px}
.g-green{background:linear-gradient(160deg,var(--green),var(--green-deep))}
.g-blue{background:linear-gradient(160deg,var(--blue),var(--blue-deep))}
.g-purple{background:linear-gradient(160deg,var(--purple),var(--purple-deep))}
.g-orange{background:linear-gradient(160deg,var(--orange),var(--orange-deep))}
.tag-need{font-size:11px;color:var(--orange-deep);font-weight:700;margin-top:4px}
.tag-prog{font-size:11px;color:var(--gold-soft);font-weight:600;margin-top:4px}

/* ---------- TOP BAR (player chip) ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0}
.chip{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:6px 12px 6px 6px;border-radius:30px}
.chip .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:17px;background:linear-gradient(160deg,var(--gold),var(--gold-deep))}
.chip b{font-weight:600;font-size:13.5px}
.chip small{display:block;font-size:11px;color:var(--gold-soft);font-weight:600;line-height:1}
.linkbtn{background:none;border:none;color:var(--gold-soft);font-family:var(--sans);font-size:12.5px;font-weight:600;cursor:pointer;opacity:.85}

/* ---------- BOTTOM NAV ---------- */
.nav{display:flex;justify-content:space-around;align-items:center;padding:11px 8px calc(11px + env(safe-area-inset-bottom));background:rgba(8,13,40,.86);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,.07)}
.nav button{background:none;border:none;color:#aeb6d6;font-family:var(--sans);display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;font-weight:600;letter-spacing:.04em;cursor:pointer;padding:4px 8px;border-radius:10px}
.nav button.on{color:var(--gold)}
.nav svg{width:21px;height:21px}

/* ---------- QUIZ ---------- */
.qhead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 6px}
.lives{display:flex;align-items:center;justify-content:center;gap:5px;padding:2px 0 4px}
.lives .hrt{font-size:18px;line-height:1;transition:transform .18s,opacity .18s}
.lives .hrt.off{opacity:.55;filter:grayscale(.3)}
.lives .hrt.pop{transform:scale(1.5)}
.lives-lbl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold-soft);margin-left:6px;opacity:.85}
.qscore{display:inline-block;background:rgba(230,193,88,.14);border:1px solid rgba(230,193,88,.3);color:var(--gold-soft);font-weight:700;font-size:12px;padding:2px 8px;border-radius:20px;margin-right:6px}
.levelprog{text-align:center;margin:2px auto 0;max-width:260px;font-size:10.5px;color:var(--gold-soft);font-weight:600;padding:0 14px;line-height:1.4}
.lptrack{height:5px;background:rgba(255,255,255,.12);border-radius:4px;margin-top:3px;overflow:hidden}
.lpfill{height:100%;background:var(--gold);border-radius:4px;transition:width .3s}
.qhead .back{background:none;border:none;color:#cdd4ef;font-size:24px;cursor:pointer;width:34px}
.qhead .lvlname{font-family:var(--serif);letter-spacing:.16em;font-size:12.5px;font-weight:600;color:#8fb4ff;text-transform:uppercase}
.qhead .count{font-weight:700;font-size:15px;color:#cdd4ef}
.qhead .count b{color:#fff}
.timerwrap{display:flex;align-items:center;justify-content:center;gap:14px;margin:6px 0 18px}
.ring{position:relative;width:78px;height:78px}
.ring svg{transform:rotate(-90deg)}
.ring .num{position:absolute;inset:0;display:grid;place-items:center;text-align:center;font-weight:700}
.ring .num b{font-size:24px;line-height:1;display:block;font-family:var(--serif)}
.ring .num span{font-size:10px;letter-spacing:.18em;color:#9fb0e0}
.timerlabel{display:flex;align-items:center;gap:7px;color:#9fb0e0;font-size:12px;font-weight:600;letter-spacing:.04em}
.qcard{background:var(--card);color:var(--ink);margin:0 18px;border-radius:22px;padding:24px 20px 22px;box-shadow:var(--shadow)}
.quote{font-family:var(--read);font-size:48px;line-height:.4;color:var(--gold);height:18px}
.qtext{font-family:var(--read);font-weight:700;font-size:25px;line-height:1.18;margin:0 0 8px;color:#1a2046}
.qref{font-size:11px;letter-spacing:.14em;font-weight:700;color:#9aa0bb;text-transform:uppercase;margin-bottom:16px}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:13px;border:1.5px solid var(--line);border-radius:16px;padding:13px 14px;cursor:pointer;background:#fff;transition:all .14s ease;font-size:16px;color:#2a3050;text-align:left;font-family:var(--sans);width:100%}
.opt .letter{width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px;flex:0 0 auto}
.opt:active{transform:scale(.99)}
.opt.sel{background:#eef4ff;border-color:var(--blue)}
.opt.correct{background:#e9f8ee;border-color:var(--good)}
.opt.correct .letter{background:var(--good)}
.opt.wrong{background:#fdecea;border-color:var(--bad)}
.opt.wrong .letter{background:var(--bad)}
.opt.dim{opacity:.45}
.opt:disabled{cursor:default}
.lifebar{display:flex;justify-content:space-around;margin:16px 18px 22px;background:rgba(8,13,40,.6);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:12px 8px}
.life{background:none;border:none;color:#cfd6f2;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:.03em;cursor:pointer}
.life svg{width:24px;height:24px;color:var(--gold)}
.life:disabled{opacity:.32;cursor:default}
.life .badge{font-size:9px;background:rgba(230,193,88,.18);color:var(--gold);border-radius:8px;padding:0 6px;line-height:14px;margin-top:1px}

/* ---------- RESULTS ---------- */
.res{background:
  radial-gradient(700px 420px at 50% -5%, #2b6f3e 0%, transparent 62%),
  linear-gradient(180deg,#0f3522,#0a1030 70%)}
.confetti{position:absolute;top:0;left:0;width:100%;height:240px;pointer-events:none;overflow:hidden}
.conf{position:absolute;width:8px;height:13px;opacity:0;border-radius:1px;animation:fall linear forwards}
@keyframes fall{0%{opacity:0;transform:translateY(-30px) rotate(0)}10%{opacity:1}100%{opacity:.9;transform:translateY(260px) rotate(540deg)}}
.crown{font-size:40px;margin-top:8px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4))}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   QUIZ BÍBLICO — app de família (Igreja Vidas)
   v1: roda 100% offline. Os dados ficam salvos neste aparelho.
   Próximo passo: ligar Supabase para login + ranking na nuvem.
   ============================================================ */

/* ============================================================
   CONFIG SUPABASE — COLE SEUS DADOS AQUI (passo 3 do tutorial)
   ============================================================ */
const SUPABASE_URL = "https://ghjbljypxksubmcsvaig.supabase.co";       // ex.: https://xxxxxxxx.supabase.co
const SUPABASE_KEY = "sb_publishable_qXCYqg1WdmelY9D1mptZXg_U8NdoKby";   // começa com sb_publishable_
let   ADMIN_PIN    = "3110";                          // <<< TROQUE pela senha do administrador (só você)

/* ---- armazenamento local (cache offline, com fallback em memória) ---- */
const mem={};
const store={
  get(k){try{return localStorage.getItem(k)}catch(e){return k in mem?mem[k]:null}},
  set(k,v){try{localStorage.setItem(k,v)}catch(e){mem[k]=v}},
};

/* ---- cliente Supabase (nuvem) ---- */
const _URL = SUPABASE_URL.trim().replace(/\s+/g,'').replace(/\/rest\/v1.*$/i,'').replace(/\/+$/,'');  // remove barra final e /rest/v1 colado por engano
const _KEY = SUPABASE_KEY.trim();
const NUVEM_ON = /^https:\/\/[a-z0-9-]+\.supabase\.co$/i.test(_URL) && _KEY.length>20 && !!(window.supabase);
const sb = NUVEM_ON ? window.supabase.createClient(_URL, _KEY) : null;

/* ---- estado em memória ---- */
let data={profiles:[],lastId:null};
function salvarCacheLocal(){store.set('qb_data',JSON.stringify(data));}
function persist(){salvarCacheLocal();if(current)salvarPontos(current);}

/* ---- PIN guardado como "impressão digital" (hash), nunca em texto puro ---- */
async function hashPin(nome,pin){
  const txt='quizbiblico|'+(nome||'').toLowerCase().trim()+'|'+pin;
  try{
    if(window.crypto&&crypto.subtle){
      const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(txt));
      return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    }
  }catch(e){}
  // contexto não seguro (ex.: arquivo aberto direto do disco): hash simples de reserva
  let h=0;for(let i=0;i<txt.length;i++){h=(h*31+txt.charCodeAt(i))>>>0;}
  return 'f'+h.toString(16);
}

/* ---- conversão nuvem <-> local ---- */
function rowToProfile(r){return {id:r.id,name:r.nome,avatar:r.avatar,total:r.total||0,perLevel:r.per_level||{},peak:r.peak||0,pin_hash:r.pin_hash,history:[]};}

/* ---- camada de dados (nuvem com cache local) ---- */
async function carregarJogadores(){
  if(sb){
    try{
      const res=await sb.from('jogadores').select('*').order('total',{ascending:false});
      if(res.error)throw res.error;
      data.profiles=(res.data||[]).map(rowToProfile);
      try{data.lastId=(JSON.parse(store.get('qb_data')||'{}').lastId)||null}catch(e){}
      salvarCacheLocal();return;
    }catch(e){console.warn('Nuvem indisponível, usando cache local:',e.message);}
  }
  try{const d=JSON.parse(store.get('qb_data'));if(d&&d.profiles)data=d;}catch(e){}
  if(!data.profiles)data.profiles=[];
}
async function criarJogador(nome,avatar,pin){
  const pin_hash=await hashPin(nome,pin);
  if(sb){
    const res=await sb.from('jogadores').insert({nome,avatar,pin_hash,total:0,per_level:{},peak:0}).select().single();
    if(res.error)throw res.error;
    const p=rowToProfile(res.data);data.profiles.push(p);salvarCacheLocal();return p;
  }
  const p={id:'p'+Date.now(),name:nome,avatar,total:0,perLevel:{},peak:0,pin_hash,history:[]};
  data.profiles.push(p);salvarCacheLocal();return p;
}
async function removerJogador(id){
  if(sb){const res=await sb.from('jogadores').delete().eq('id',id);if(res.error)throw res.error;}
  data.profiles=data.profiles.filter(p=>p.id!==id);salvarCacheLocal();
}
async function salvarPontos(p){
  salvarCacheLocal();
  if(sb){try{await sb.from('jogadores').update({total:p.total,per_level:p.perLevel,peak:p.peak}).eq('id',p.id);}
  catch(e){console.warn('Não consegui salvar na nuvem agora (mantido no aparelho):',e.message);}}
}
async function definirPin(p,novoPin){
  const pin_hash=await hashPin(p.name,novoPin);
  if(sb){const res=await sb.from('jogadores').update({pin_hash}).eq('id',p.id);if(res.error)throw res.error;}
  p.pin_hash=pin_hash;salvarCacheLocal();
}

/* ---- níveis ---- */
const LEVELS=[
  {key:'iniciante',  nome:'INICIANTE',  desc:'Perguntas mais fáceis para começar',           cls:'g-green',  cor:'var(--green)',  emoji:'🌱', meta:20},
  {key:'medio',      nome:'MÉDIO',      desc:'Desafios com nível moderado',                   cls:'g-blue',   cor:'var(--blue)',   emoji:'📖', meta:30},
  {key:'intermediario',nome:'INTERMEDIÁRIO',desc:'Perguntas mais desafiadoras para testar você',cls:'g-purple', cor:'var(--purple)', emoji:'👑', meta:40},
  {key:'expert',     nome:'EXPERT',     desc:'Apenas para os verdadeiros conhecedores da Palavra',cls:'g-orange',cor:'var(--orange)',emoji:'🛡️', meta:50},
];
const lvlByKey=k=>LEVELS.find(l=>l.key===k);

/* ---- regras de pontuação e progressão ----
   total    = soma dos pontos acumulados por nível (perde-se ao estourar erros);
   _ac[key] = respostas certas ACUMULADAS EM CADA NÍVEL (progressão; nunca se perde);
   meta     = acertos necessários NAQUELE nível para liberar o próximo (no Expert, para vencer);
   peak     = maior total de pontos já alcançado (referência). */
function recomputeTotal(p){
  p.total=LEVELS.reduce((s,L)=>s+(p.perLevel[L.key]||0),0);
  if(p.total>(p.peak||0))p.peak=p.total;
  return p.total;
}
function getAc(p,key){return (p.perLevel&&p.perLevel._ac&&p.perLevel._ac[key])||0;}
function addAc(p,key,n){if(!p.perLevel)p.perLevel={};if(!p.perLevel._ac)p.perLevel._ac={};const meta=(lvlByKey(key)||{}).meta||Infinity;p.perLevel._ac[key]=Math.min(meta,getAc(p,key)+(n||0));}
function totalAcertos(p){return LEVELS.reduce((s,L)=>s+getAc(p,L.key),0);}
function levelUnlocked(p,l){const i=LEVELS.indexOf(l);if(i<=0)return true;const prev=LEVELS[i-1];return getAc(p,prev.key)>=prev.meta;}
function venceu(p){const last=LEVELS[LEVELS.length-1];return getAc(p,last.key)>=last.meta;}
function normalizeProfiles(){
  data.profiles.forEach(p=>{
    if(!p.perLevel)p.perLevel={};
    if(!p.history)p.history=[];
    if(p.peak==null)p.peak=p.total||0;
    if(!p.perLevel._ac){p.perLevel._ac={};(p.history||[]).forEach(x=>{if(x.key)p.perLevel._ac[x.key]=(p.perLevel._ac[x.key]||0)+(x.acertos||0)});}
    LEVELS.forEach(L=>{if(p.perLevel._ac[L.key]>L.meta)p.perLevel._ac[L.key]=L.meta;});  // trava cada nível na sua meta
    recomputeTotal(p);
  });
}

const app=document.getElementById('app');
let current=null;            // perfil ativo
let quiz=null;               // estado da rodada
const ROUND=10;              // perguntas por rodada
let   QTIME=15;              // segundos por pergunta (ajustável pelo admin)
const ERR_LIMIT=5;           // erros permitidos por rodada; o 6º zera o nível
function getQTime(){const v=parseInt(store.get('qb_qtime'),10);return (v>=5&&v<=120)?v:15;}
function setQTime(v){v=Math.max(5,Math.min(120,parseInt(v,10)||15));store.set('qb_qtime',String(v));QTIME=v;return v;}
QTIME=getQTime();

function flash(msg){const f=document.getElementById('flash');f.textContent=msg;f.classList.add('show');clearTimeout(f._t);f._t=setTimeout(()=>f.classList.remove('show'),1800)}
function esc(s){return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

/* ---- troca de telas ---- */
function show(html){app.innerHTML=html;const s=app.querySelector('.screen');requestAnimationFrame(()=>s&&s.classList.add('active'))}

   ============================================================ */
/* baralho de perguntas por nível: distribui sem repor; re-embaralha só quando acaba */
let decks={};
function drawRound(key){
  const pool=QUESTIONS[key];
  if(!decks[key]||decks[key].length<ROUND){
    decks[key]=shuffle(pool.map((_,i)=>i));   // novo baralho embaralhado (sem repetição interna)
  }
  return decks[key].splice(0,ROUND).map(i=>pool[i]);
}
function startQuiz(key){
  QTIME=getQTime();          // aplica o tempo definido pelo admin
  const pool=drawRound(key).map(qq=>{         // 10 perguntas sem repetir até esgotar o nível
    const opts=qq.o.map((t,i)=>({t,correct:i===qq.c}));
    const sh=shuffle(opts);
    return {q:qq.q,ref:qq.ref,dica:qq.dica,opts:sh,answer:sh.findIndex(o=>o.correct)};
  });
  quiz={key,pool,i:0,acertos:0,erros:0,pontos:0,times:[],hints:2,plus:2,answered:false,time:QTIME,acStart:getAc(current,key)};
  renderQuestion();
}
function renderQuestion(){
  const l=lvlByKey(quiz.key),qq=quiz.pool[quiz.i];
  quiz.time=QTIME;quiz.answered=false;quiz.tStart=Date.now();
  show(`
  <div class="screen active">
    <div class="qhead">
      <button class="back" id="qback">‹</button>
      <span class="lvlname">NÍVEL: ${l.nome}</span>
      <span class="count"><span class="qscore">⭐ ${current.total+quiz.pontos}</span> <b>${quiz.i+1}</b>/${ROUND}</span>
    </div>
    <div class="lives" id="lives" title="Você pode errar até ${ERR_LIMIT} vezes">
      ${Array.from({length:ERR_LIMIT}).map((_,i)=>`<span class="hrt${i<(ERR_LIMIT-quiz.erros)?'':' off'}">${i<(ERR_LIMIT-quiz.erros)?'❤️':'🤍'}</span>`).join('')}
      <span class="lives-lbl">VIDAS</span>
    </div>
    <div class="levelprog">
      <span>✓ ${getAc(current,quiz.key)}/${l.meta} acertos neste nível para liberar o próximo</span>
      <div class="lptrack"><div class="lpfill" style="width:${Math.min(100,getAc(current,quiz.key)/l.meta*100)}%"></div></div>
    </div>
    <div class="timerwrap">
      <div class="ring">
        <svg width="78" height="78"><circle cx="39" cy="39" r="33" stroke="rgba(255,255,255,.12)" stroke-width="6" fill="none"/>
        <circle id="ringfg" cx="39" cy="39" r="33" stroke="${l.cor}" stroke-width="6" fill="none" stroke-linecap="round"
          stroke-dasharray="${2*Math.PI*33}" stroke-dashoffset="0"/></svg>
        <div class="num"><b id="secs">${QTIME}</b><span>SEG</span></div>
      </div>
      <div class="timerlabel">⏱ TEMPO<br>RESTANTE</div>
    </div>
    <div class="qcard">
      <div class="quote">&ldquo;</div>
      <p class="qtext">${esc(qq.q)}</p>
      ${qq.ref?`<div class="qref">${esc(qq.ref)}</div>`:''}
      <div class="opts" id="opts">
        ${qq.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="letter">${'ABCD'[i]}</span><span>${esc(o.t)}</span></button>`).join('')}
      </div>
    </div>
    <div class="lifebar">
      <button class="life" id="dica" ${quiz.hints<=0?'disabled':''}>${bulbSVG}<span>DICA</span><span class="badge">${quiz.hints}</span></button>
      <button class="life" id="pular">${skipSVG}<span>PULAR</span></button>
      <button class="life" id="plus" ${quiz.plus<=0?'disabled':''}>${clockSVG}<span>+5 SEGUNDOS</span><span class="badge">${quiz.plus}</span></button>
    </div>
  </div>`);
  document.getElementById('qback').onclick=()=>{stopTimer();persist();screenMenu()};
  app.querySelectorAll('.opt').forEach(b=>b.onclick=()=>answer(+b.dataset.i));
  document.getElementById('pular').onclick=()=>{quiz.times.push(QTIME);next()};
  document.getElementById('dica').onclick=useHint;
  document.getElementById('plus').onclick=usePlus;
  startTimer();
}
let timer=null;
function startTimer(){
  const fg=document.getElementById('ringfg'),circ=2*Math.PI*33;
  stopTimer();
  timer=setInterval(()=>{
    quiz.time-=0.1;
    if(quiz.time<=0){quiz.time=0;stopTimer();timeUp();return}
    document.getElementById('secs').textContent=Math.ceil(quiz.time);
    fg.style.strokeDashoffset=circ*(1-quiz.time/QTIME);
  },100);
}
function stopTimer(){if(timer){clearInterval(timer);timer=null}}
function useHint(){
  if(quiz.hints<=0||quiz.answered)return;
  const qq=quiz.pool[quiz.i];const wrong=qq.opts.map((o,i)=>i).filter(i=>i!==qq.answer);
  shuffle(wrong).slice(0,2).forEach(i=>{const b=app.querySelector(`.opt[data-i="${i}"]`);b.classList.add('dim');b.disabled=true});
  quiz.hints--;const d=document.getElementById('dica');d.querySelector('.badge').textContent=quiz.hints;if(quiz.hints<=0)d.disabled=true;
}
function usePlus(){
  if(quiz.plus<=0||quiz.answered)return;
  quiz.time=Math.min(QTIME,quiz.time+5);quiz.plus--;
  const p=document.getElementById('plus');p.querySelector('.badge').textContent=quiz.plus;if(quiz.plus<=0)p.disabled=true;
  flash('+5 segundos');
}
function timeUp(){quiz.erros++;updateLives();quiz.times.push(QTIME);const qq=quiz.pool[quiz.i];const c=app.querySelector(`.opt[data-i="${qq.answer}"]`);if(c)c.classList.add('correct');flash('Tempo esgotado!');quiz.answered=true;setTimeout(next,1100)}
function answer(i){
  if(quiz.answered)return;quiz.answered=true;stopTimer();
  const qq=quiz.pool[quiz.i];const used=(Date.now()-quiz.tStart)/1000;quiz.times.push(Math.min(QTIME,used));
  app.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  if(i===qq.answer){
    app.querySelector(`.opt[data-i="${i}"]`).classList.add('correct');
    const bonus=Math.max(0,Math.round((QTIME-used)*4));
    const gained=60+bonus;quiz.pontos+=gained;quiz.acertos++;
    addAc(current,quiz.key,1);   // conta o acerto na hora; trava ao atingir a meta do nível
  }else{
    app.querySelector(`.opt[data-i="${i}"]`).classList.add('wrong');
    app.querySelector(`.opt[data-i="${qq.answer}"]`).classList.add('correct');
    quiz.erros++;updateLives();
  }
  setTimeout(next,1100);
}
function next(){
  stopTimer();
  if(quiz.erros>ERR_LIMIT){bustLevel();return;}   // 6º erro → zera o nível
  if(quiz.i<quiz.pool.length-1){quiz.i++;renderQuestion();}
  else finishQuiz();
}
function updateLives(){
  const box=document.getElementById('lives');if(!box)return;
  const left=Math.max(0,ERR_LIMIT-quiz.erros);
  const hrts=box.querySelectorAll('.hrt');
  hrts.forEach((h,i)=>{const alive=i<left;h.textContent=alive?'❤️':'🤍';h.classList.toggle('off',!alive)});
  const lost=hrts[left];if(lost){lost.classList.add('pop');setTimeout(()=>lost.classList.remove('pop'),200)}
}
function bustLevel(){
  stopTimer();
  const key=quiz.key;
  const perdidos=current.perLevel[key]||0;
  current.perLevel[key]=0;                 // perde só os pontos deste nível
  // os acertos do nível já foram contados ao vivo durante a rodada e não se perdem
  recomputeTotal(current);
  current.history.push({key,pontos:0,acertos:quiz.acertos,erros:quiz.erros,busted:true,date:Date.now()});
  persist();
  screenBust(key,perdidos);
}
function screenBust(key,perdidos){
  const l=lvlByKey(key);
  show(`
  <div class="screen res active center">
    <div class="pad" style="padding-top:28px;width:100%">
      <div class="crown" style="filter:grayscale(1)">💔</div>

      <div class="subdone">Você atingiu o limite de ${ERR_LIMIT} erros no nível ${l.nome}</div>
      ${shieldSVG(l,0)}
      <p class="small-note" style="margin-top:14px">
        Você perdeu os <b style="color:var(--bad)">${perdidos} pontos</b> acumulados deste nível.<br>
        Os pontos dos outros níveis foram mantidos.<br>
        Total agora: <b style="color:var(--gold-soft)">${current.total} pontos</b>
      </p>
      <div class="actions">
        <button class="btn btn-green" id="retry">↻  COMEÇAR O NÍVEL DE NOVO</button>
        <button class="btn btn-dark" id="tomenu">🏠  VOLTAR AO MENU</button>
      </div>
    </div>

  document.getElementById('retry').onclick=()=>startQuiz(key);

}

/* ============================================================
   FIM DA RODADA — salva e mostra resultado
   ============================================================ */
function finishQuiz(){
  const l=quiz.key, Lobj=lvlByKey(l);
  current.perLevel[l]=(current.perLevel[l]||0)+quiz.pontos;   // ACUMULA o cofre de pontos do nível
  const antes=quiz.acStart;                                   // acertos do nível ANTES desta rodada
  const depois=getAc(current,l);                              // já atualizados ao vivo durante a rodada
  recomputeTotal(current);
  current.history.push({key:l,pontos:quiz.pontos,acertos:quiz.acertos,erros:quiz.erros,date:Date.now()});
  const idx=LEVELS.findIndex(x=>x.key===l);
  const nextL=LEVELS[idx+1];
  const cruzouMeta=antes<Lobj.meta&&depois>=Lobj.meta;
  const desbloqueou=nextL&&cruzouMeta?nextL:null;            // liberou o próximo nível
  const novaVitoria=!nextL&&cruzouMeta;                       // expert atingiu a meta = venceu
  persist();
  screenResults(desbloqueou,novaVitoria);
}
function screenResults(unlocked,novaVitoria){
  const l=lvlByKey(quiz.key);
  const avg=quiz.times.length?Math.round(quiz.times.reduce((a,b)=>a+b,0)/quiz.times.length):0;
  // proxima fase
  const idx=LEVELS.findIndex(x=>x.key===quiz.key);
  const nextL=LEVELS[idx+1];
  const canNext=nextL&&levelUnlocked(current,nextL);
  // barra de progresso por nível (melhor pontuação por nível)
  show(`
  <div class="screen res active center">
    <div class="confetti" id="cf"></div>
    <div class="pad" style="padding-top:18px;width:100%">
      <div class="crown">👑</div>
      <div class="parabens">PARABÉNS!</div>
      <div class="subdone">Você concluiu esta rodada de ${l.nome}</div>
      ${shieldSVG(l,quiz.pontos)}
      <p class="small-note" style="margin-top:10px">
        +${quiz.pontos} pontos nesta rodada • <b style="color:var(--good)">${quiz.acertos} acertos</b><br>
        Pontos acumulados no ${l.nome}: <b style="color:var(--gold-soft)">${current.perLevel[quiz.key]||0}</b><br>
        ${getAc(current,quiz.key)>=l.meta
          ?`Acertos no ${l.nome}: <b style="color:var(--good)">${l.meta}/${l.meta} ✓</b> ${nextL?'— nível concluído!':'— você venceu!'}`
          :`Acertos no ${l.nome}: <b style="color:var(--gold-soft)">${getAc(current,quiz.key)}</b> / ${l.meta} ${nextL?'para liberar o próximo nível':'para vencer'}`}
      </p>
      <div class="stats3">
        <div class="st">${checkSVG}<b style="color:var(--good)">${quiz.acertos}</b><small>Acertos</small></div>
        <div class="st sep">${xSVG}<b style="color:var(--bad)">${quiz.erros}</b><small>Erros</small></div>
        <div class="st">${clockBlueSVG}<b style="color:#6fa8ff">${avg<10?'0':''}${avg}s</b><small>Tempo médio</small></div>
      </div>
      <div class="progblock">
        <div class="progtitle">SEU PROGRESSO</div>
        <div class="track"><div class="fill" id="fill" style="width:0%"></div></div>
        <div class="dots">
          ${LEVELS.map(L=>{
            const reached=levelUnlocked(current,L);
            return `<div class="dotwrap">
              <span class="dot ${reached?'on':''}" style="${reached?'background:'+L.cor:''}">${levelIcon(L.key,14)}</span>
              <small>${L.nome}</small>
              <b style="color:${reached?'var(--gold-soft)':'#5b6398'}">${getAc(current,L.key)}/${L.meta}</b>
            </div>`;
          }).join('')}
        </div>
      </div>
      ${novaVitoria
        ?`<p class="small-note" style="color:var(--gold-soft);font-weight:700;font-size:14px;margin-top:16px">🏆 PARABÉNS! Você venceu o Quiz Bíblico!</p>`
        :(unlocked?`<p class="small-note" style="color:var(--gold-soft);font-weight:600;margin-top:16px">🎉 Você desbloqueou o nível ${unlocked.nome}!</p>`:'')}
      <div class="actions">
        ${canNext?`<button class="btn btn-green" id="nextlvl">▶  PRÓXIMO NÍVEL</button>`:
          `<button class="btn btn-green" id="again">▶  JOGAR MAIS NESTE NÍVEL</button>`}
        <button class="btn btn-dark" id="tomenu">🏠  VOLTAR AO MENU</button>
      </div>
    </div>
  </div>`);
  // animações — a barra enche só até o nível em que a pessoa está (não ultrapassa o próximo ponto travado)
  let g=LEVELS.findIndex(L=>getAc(current,L.key)<L.meta);
  let pct;
  if(g===-1){pct=100;}  // todos os níveis concluídos = venceu
  else{const frac=Math.min(1,getAc(current,LEVELS[g].key)/LEVELS[g].meta);pct=Math.min(100,Math.round((g+frac)/(LEVELS.length-1)*100));}
  requestAnimationFrame(()=>{document.getElementById('fill').style.width=pct+'%'});
  confetti();
  const nb=document.getElementById('nextlvl');if(nb)nb.onclick=()=>startQuiz(nextL.key);
  const ag=document.getElementById('again');if(ag)ag.onclick=()=>startQuiz(quiz.key);
  document.getElementById('tomenu').onclick=screenMenu;
}
function confetti(){
  const box=document.getElementById('cf');if(!box)return;
  const cols=['#e6c158','#39b865','#2d7ff9','#8b5cf6','#e0801a','#fff'];
  for(let i=0;i<46;i++){
    const c=document.createElement('div');c.className='conf';
    c.style.left=Math.random()*100+'%';
    c.style.background=cols[i%cols.length];
    c.style.animationDuration=(1.6+Math.random()*1.6)+'s';
    c.style.animationDelay=(Math.random()*0.6)+'s';
    box.appendChild(c);
  }
}
